name: Crypto Daily Brief

# Automatic schedule disabled — pipeline now runs locally via Claude Code scheduled task.
# Keep workflow_dispatch so you can still trigger a run manually from the GitHub Actions tab
# if needed (e.g. your PC is off one morning).
on:
  workflow_dispatch:  # manual trigger only

jobs:
  podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          MESSARI_SENDER: ${{ secrets.MESSARI_SENDER }}
          DEFIANT_SENDER: ${{ secrets.DEFIANT_SENDER }}
          COINTELEGRAPH_SENDER: ${{ secrets.COINTELEGRAPH_SENDER }}
        run: python src/main.py

      - name: Upload MP3 artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-mp3
          path: output/*.mp3
          retention-days: 7
